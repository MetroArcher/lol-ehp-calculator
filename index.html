<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>LoL Effective HP Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>LoL Effective HP Calculator</h1>

    <div class="calculator">

        <div class="top-section">

            <div class="inputs-panel">
                <div class="input-group">
                    <label>HP</label>
                    <input id="hp" type="number" min="1" placeholder="e.g. 2000">
                </div>

                <div class="input-group">
                    <label>Armor</label>
                    <input id="armor" type="number" min="0" placeholder="e.g. 100">
                </div>

                <div class="input-group">
                    <label>Magic Resist</label>
                    <input id="mr" type="number" min="0" placeholder="e.g. 80">
                </div>

                <div class="input-group">
                    <label>Enemy Physical Damage %</label>
                    <input id="phys" type="number" min="0" max="100" placeholder="e.g. 70">
                    <div id="magicInfo"></div>
                </div>

                <div class="input-group">
                    <label>Gold Budget</label>
                    <input id="gold" type="number" min="300" placeholder="e.g. 1500">
                </div>

                <button id="toggleAdvanced" class="secondary-btn" type="button">
                    Show Advanced Options
                </button>
            </div>

            <div id="advancedOptions" class="advanced-panel" style="display:none;">
                <h2 class="advanced-title">Advanced Damage Settings</h2>

                <div class="input-group">
                    <label>Lethality</label>
                    <input id="lethality" type="number" value="0">
                </div>

                <div class="input-group">
                    <label>% Armor Pen</label>
                    <input id="armorPen" type="number" value="0">
                </div>

                <div class="input-group">
                    <label>Flat Magic Pen</label>
                    <input id="magicPen" type="number" value="0">
                </div>

                <div class="input-group">
                    <label>% Magic Pen</label>
                    <input id="magicPenPercent" type="number" value="0">
                </div>
            </div>

        </div>

        <button id="calculate" class="primary-btn" type="button">Calculate</button>

        <div class="results">
            <div class="analysis-section">
                <h2>Base Analysis</h2>
                <div id="result"></div>
            </div>

            <div class="analysis-section">
                <h2>Theoretical Stat Optimization</h2>
                <div id="bestResult"></div>
                <div id="comparison"></div>
            </div>

            <div class="analysis-section">
                <h2>Best Component Combination</h2>
                <div id="itemResult"></div>
            </div>

            <div class="analysis-section">
                <h2>Top Full Items by EHP per Gold</h2>
                <div id="itemScenario"></div>
                <div class="passive-inline-row">
                    <div class="passive-inline-field" id="warmogBonusHpBox">
                        <label for="existingBonusHp">Warmog bonus HP</label>
                        <input id="existingBonusHp" type="number" min="0" value="0">
                    </div>

                    <div class="passive-inline-field" id="jakshoArmorBox">
                        <label for="existingBonusArmor">Jak'Sho bonus Armor</label>
                        <input id="existingBonusArmor" type="number" min="0" value="0">
                    </div>

                    <div class="passive-inline-field" id="jakshoMrBox">
                        <label for="existingBonusMr">Jak'Sho bonus MR</label>
                        <input id="existingBonusMr" type="number" min="0" value="0">
                    </div>
                </div>
                <div id="fullItemRanking"></div>
                <div class="ranking-controls">
                    <button id="toggleFullItemView" type="button">Show All Items</button>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
