<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>LoL Effective HP Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>LoL Effective HP Calculator</h1>

<div class="input-group">
  <label>HP</label>
  <input id="hp" type="number" placeholder="e.g. 2000">
</div>

<div class="input-group">
  <label>Armor</label>
  <input id="armor" type="number" placeholder="e.g. 100">
</div>

<div class="input-group">
  <label>Magic Resist</label>
  <input id="mr" type="number" placeholder="e.g. 80">
</div>

<div class="input-group">
  <label>Enemy Physical Damage %</label>
  <input id="phys" type="number" placeholder="e.g. 70">
<p id="magicInfo"></p>
</div>

<div class="input-group">
  <label>Gold Budget</label>
  <input id="gold" type="number" placeholder="e.g. 1500">
</div>

<button id="calculate">Calculate</button>

<p id="result"></p>
<p id="bestResult"></p>
<p id="comparison"></p>
<p id="itemResult"></p>
<div id="fullItemRanking"></div>

<script src="script.js"></script>

</body>
</html>
